name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (all features)
        run: cargo test --workspace --all-features

  publish-dry-run:
    name: Publish dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Dry run publish agent-meter
        run: cargo publish --dry-run --manifest-path crates/agent-meter/Cargo.toml

      # agent-meter-axum dry-run is skipped here: cargo resolves its `agent-meter`
      # dep from crates.io, which doesn't exist until after first publish. The actual
      # publish job handles ordering (agent-meter first, sleep, then agent-meter-axum).

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, publish-dry-run]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish agent-meter
        run: cargo publish --manifest-path crates/agent-meter/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Wait for crates.io index to update before publishing dependent crate
      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish agent-meter-axum
        run: cargo publish --manifest-path crates/agent-meter-axum/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish agent-meter-client
        run: cargo publish --manifest-path crates/agent-meter-client/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
